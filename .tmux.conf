# ------- TMUX config (c) by schloss ---------
# Last Update: 2026-06-14 


# ------------ Basic settings ----------------
#set -g status-position top
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g status-interval 3
set -g history-limit 1000000
set -g set-clipboard on
set-option -g allow-rename off
set -g renumber-windows on 
setw -g mode-key vi
setw -g aggressive-resize on
set -g display-panes-time 3000
set -g pane-border-status off
set -g monitor-activity on
set -g default-terminal "${TERM}"

unbind C-b
set -g prefix C-y


# ---------------- binds ---------------------
bind Space last-window
bind Q kill-session




# ------ Open panes in the same path ---------
bind '"' split-window -c "#{panel_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"


# ------------- All plugins ------------------
# git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-yanl'
set -g @plugin 'tassaron/tmux-df'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# ---------- tmux-fzf key --------------------
TMUX_FZF_LAUNCH_KEY="C-f"

# --------- tmux-resurrect -------------------
# prefix + Ctrl-s # default save
# prefix + Ctrl-r # default restore
# set -g @resurrect-dir '~/.tmux/resurrect'   # default path 


# ----- Toggle extra window with prefix p ----
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'green'
set -g @floax-text-color 'orange'
set -g @floax-bind 'p'
set -g @floax-change-path 'false'
set -g @floax-title ' floax '


# ----- Status bar (and theme) in general ----
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style "rounded"
set -g status-left-length 100
set -g status-right-length 100

# --------- magnifying glass if zoom ---------
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,(),}"
 

# --------- Status bar left side -------------
set -g status-left ""

# Show session number on the left side
set -ag status-left "#{E:@catppuccin_status_session}"

# Two spaces gap
set -ag status-left "#[bg=#{@thm_bg}]  "

# Show the session symbol red if prefix is aktive
set -ag status-left "#{?client_prefix,#[bg=@thm_red]}"


# --------- Status bar right side ------------
set -g status-right ""

# show git status with gitmux (https://github.com/arl/gitmux -> binary cp to .local/bin)
set -ag status-right '#[fg=#{@thm_crust},bg=#{@thm_bg}] #(gitmux "#{pane_current_path}") '

# Show hostname and time
set -ag status-right "#[fg=#{@thm_crust},bg=#{@thm_teal}] #h |(#{df_avail} free) "


# -- example: Open a new window (mid) and run mc in it -----------
#bind b new-window -n mid -c "{pane_current_path}" "mc"

# Move status bar to the top: Prefix Ctrl+t
bind-key C-t run-shell "tmux set-option -g status-position top;"

# Move status bar to the botton: Prefix Ctrl+b
bind-key C-b run-shell "tmux set-option -g status-position bottom;"


# ------- Copy and paste like vim ------------

# Install xsel for copy/paste on X
# Install wl-copy for copy/paste on wayland
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
#bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel "xsel -i -b" # Not working
bind -T     copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xsel -i -b'
bind ( copy-mode
bind ) paste-buffer -p 


# --- fzf-url list URLs -> open in browser ----
###set -g @fzf-url-custom-pat \b[^[:space:]]+\.(jpg|png|pdf)\b
set -g @fzf-url-bind 'u'




# ------- Use fzf script (from .bashrc) ------
# You need to istall fzf and put the function below to the .bashrc 
#
# fnd() {
#        local file
#        file=$(fzf --preview 'bat --style=numbers --color=always --line-range :500 {} 2>/dev/null || head -n 500 {}' \
#               --preview-window=right:60%:wrap)
#
#        [ -n "$file" ] && ${EDITOR:-vim} "$file"
#      }
#
unbind f
bind-key f send-keys "fnd" Enter


# -------------- Update plugins --------------
run '~/.tmux/plugins/tpm/tpm'


